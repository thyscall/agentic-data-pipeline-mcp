models:
  - name: stg_adventure_db__customers
    description: >
      Each row represents a single customer record from the Adventure DB
      operational customer table. Grain: one row per customer. This staging
      model standardizes customer profile and address attributes for joins to
      orders, marketing events, and web analytics via customer_id.
    columns:
      - name: customer_id
        description: >
          Unique identifier for the customer in Adventure DB. Primary key for
          this table. Join to models such as
          stg_ecom__email_campaigns.customer_id and
          int_web_analytics_with_customers.customer_id to attach customer
          attributes to events and transactions.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: >
          Customer's given name as stored in the operational customer system.
          Use with last_name or full_name for customer-facing reporting and
          identity matching.
        data_tests:
          - not_null

  - name: stg_adventure_db__inventory
    description: >
      Each row represents the inventory quantity for a single product at a
      specific warehouse location and bin in Adventure DB. Grain: one row per
      product per location_id per shelf per bin. Join to
      stg_adventure_db__products via product_id to add product details for
      stock availability and inventory analysis.

  - name: stg_adventure_db__vendors
    description: >
      Each row represents a single product vendor from the Adventure DB vendor
      master table. Grain: one row per vendor. Used to understand supplier
      attributes such as credit rating and preferred vendor status, and can be
      joined to vendor bridge models via vendor_id for procurement analysis.

  - name: stg_ecom__email_campaigns
    description: >
      Each row represents a single email marketing event from the legacy and
      new marketing feeds after deduplication. Grain: one row per event_id.
      This staging model standardizes campaign metadata and conversion signals;
      join to stg_adventure_db__customers via customer_id and to
      stg_ecom__sales_orders via order_id to analyze campaign-driven purchases.
    columns:
      - name: event_id
        description: >
          Unique identifier for the marketing event generated by the email
          campaign systems. Primary key for this table.
        data_tests:
          - unique
      - name: event_type
        description: >
          Customer interaction captured for the email campaign event. Values:
          email_opened, email_clicked, add_to_cart, conversion. Used to measure
          funnel progression from engagement to purchase.
        data_tests:
          - accepted_values:
              arguments:
                values: ['email_opened','add_to_cart','conversion', 'email_clicked']
      - name: customer_id
        description: >
          Identifier of the customer associated with this marketing event.
          Foreign key to stg_adventure_db__customers.customer_id. Join to get
          customer profile, geography, and account attributes.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_adventure_db__customers')
                field: customer_id
      - name: order_id
        description: >
          Identifier of the sales order attributed to this campaign event when
          the interaction converted to a purchase. Foreign key to
          stg_ecom__sales_orders.sales_order_id. Can be null for non-conversion
          events such as opens or clicks.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_ecom__sales_orders')
                field: sales_order_id

  - name: stg_adventure_db__products
    description: >
      Each row represents a currently sellable product from the Adventure DB
      product catalog. Grain: one row per product. Join to
      stg_adventure_db__inventory via product_id for stock levels or to order
      and analytics models via product_id for product performance reporting.
